{% extends "base.html" %}
{% block title %}코디 기록 - Fashion Diary{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="glass p-4">
      <h3 class="mb-3">오늘의 코디 기록</h3>

      <form method="post" enctype="multipart/form-data">

        <!-- ✅ (추가) 지역 + 오늘 날씨 자동 불러오기 -->
        <div class="row g-2 mb-3">
          <div class="col-8">
            <label class="form-label">지역(도시)</label>
            <input id="city" name="city" class="form-control" value="서울" placeholder="예: 서울, 부산, 제주">
          </div>
          <div class="col-4 d-flex align-items-end">
            <button id="fillWeather" type="button" class="btn btn-outline-dark w-100">오늘 날씨 불러오기</button>
          </div>
          <div class="col-12">
            <div id="weatherPreview" class="form-text" style="display:none;"></div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">사진</label>
          <input type="file" name="photos" class="form-control" accept="image/*" multiple>
          <div id="photoPreviewWrap" class="mt-3" style="display:none;">
            <div class="card-clean p-2">
              <div style="position:relative; border-radius:14px; overflow:hidden; border:1px solid var(--border);">
                <img id="photoPreviewImg"
                      alt="preview"
                      style="width:100%; height:360px; object-fit:cover; display:block;" />

                <button type="button" id="photoPrevBtn"
                  class="btn btn-soft btn-sm"
                  style="position:absolute; left:10px; top:50%; transform:translateY(-50%);">
                  ◀
                </button>

                <button type="button" id="photoNextBtn"
                  class="btn btn-soft btn-sm"
                  style="position:absolute; right:10px; top:50%; transform:translateY(-50%);">
                  ▶
                </button>

                <div id="photoCounter"
                  style="position:absolute; right:12px; bottom:12px;
                        padding:6px 10px; border-radius:999px; font-size:14px;
                        background: color-mix(in oklab, var(--card) 85%, transparent);
                        border:1px solid var(--border);">
                </div>
              </div>

              <div id="photoThumbs" class="mt-2"
                    style="display:flex; gap:8px; flex-wrap:wrap;"></div>
            </div>
          </div>

          <div id="photoTagPanel" class="mt-3" style="display:none;">
            <div class="fw-semibold mb-2">사진 태그</div>
            <div id="photoTagChips" class="d-flex flex-wrap gap-2 mb-2"></div>
            <div class="position-relative">
              <input id="photoTagInput" class="form-control" placeholder="옷장 아이템 검색">
              <div id="photoTagResults"
                   class="card-clean p-2 mt-1"
                   style="display:none; position:absolute; z-index:10; width:100%; max-height:240px; overflow:auto;"></div>
            </div>
            <input type="hidden" name="photo_tags_json" id="photoTagsJson">
            <div class="form-text mt-1">사진마다 옷장 아이템을 태그할 수 있어요.</div>
          </div>

          <div class="form-text">여러 장 선택 가능</div>
        </div>

        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">날짜</label>
            <input type="date" name="date" class="form-control" value="{{ (now or '') }}">
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">오늘의 한줄</label>
            <input name="note" class="form-control" placeholder="예: 닥터마틴 체리레드 맛있다...">
          </div>
        </div>

        <div class="row">
          <div class="col-3 mb-3">
            <label class="form-label">최저</label>
            <input id="t_min" type="number" step="0.1" name="t_min" class="form-control" placeholder="예: 22">
          </div>
          <div class="col-3 mb-3">
            <label class="form-label">최고</label>
            <input id="t_max" type="number" step="0.1" name="t_max" class="form-control" placeholder="예: 28">
          </div>
          <div class="col-3 mb-3">
            <label class="form-label">강수</label>
            <select id="rain" name="rain" class="form-select">
              <option value="0">없음</option>
              <option value="1">비/눈</option>
            </select>
          </div>
          <div class="col-3 mb-3">
            <label class="form-label">습도(%)</label>
            <input id="humidity" type="number" name="humidity" class="form-control" placeholder="예: 70">
          </div>
        </div>

        <div class="d-grid">
          <button class="btn btn-dark" type="submit">저장</button>
        </div>

      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<!-- ✅ (추가) 날씨 자동 입력 JS -->
<script>
(function () {
  const btn = document.getElementById('fillWeather');
  const cityEl = document.getElementById('city');
  const tMinEl = document.getElementById('t_min');
  const tMaxEl = document.getElementById('t_max');
  const humEl  = document.getElementById('humidity');
  const rainEl = document.getElementById('rain');
  const preview = document.getElementById('weatherPreview');

  if (!btn) return;

  btn.addEventListener('click', async () => {
    const city = (cityEl?.value || '서울').trim();
    btn.disabled = true;
    const prevText = btn.textContent;
    btn.textContent = '불러오는 중...';

    try {
      const res = await fetch(`/api/weather?city=${encodeURIComponent(city)}`);
      const j = await res.json();

      if (!j.ok) {
        alert(j.error || '날씨를 불러오지 못했어요.');
        return;
      }

      const w = j.data;

      // 입력칸 자동 채우기
      if (tMinEl) tMinEl.value = w.t_min;
      if (tMaxEl) tMaxEl.value = w.t_max;
      if (humEl)  humEl.value  = w.humidity;
      if (rainEl) rainEl.value = w.rain ? "1" : "0";

      // 미리보기
      if (preview) {
        preview.style.display = 'block';
        preview.textContent = `📍 ${w.city} | ${w.desc} | ${w.t_min}° ~ ${w.t_max}° | 습도 ${w.humidity}% | ${w.rain ? '강수 가능' : '강수 없음'}`;
      }

    } catch (e) {
      console.error(e);
      alert('날씨 호출 중 오류가 발생했어요.');
    } finally {
      btn.disabled = false;
      btn.textContent = prevText;
    }
  });
})();
</script>

<script>
/* ===== 사진 여러장 미리보기 + 슬라이더 ===== */
(function () {
  const fileInput = document.querySelector('input[type="file"][name="photos"]');
  const wrap = document.getElementById("photoPreviewWrap");
  const imgEl = document.getElementById("photoPreviewImg");
  const prevBtn = document.getElementById("photoPrevBtn");
  const nextBtn = document.getElementById("photoNextBtn");
  const counter = document.getElementById("photoCounter");
  const thumbs = document.getElementById("photoThumbs");
  const tagPanel = document.getElementById("photoTagPanel");
  const tagChips = document.getElementById("photoTagChips");
  const tagInput = document.getElementById("photoTagInput");
  const tagResults = document.getElementById("photoTagResults");
  const tagHidden = document.getElementById("photoTagsJson");
  const formEl = fileInput?.closest("form");

  const wardrobeItems = [
    {% for it in items %}
      { id: {{ it.id }}, name: {{ it.name|tojson }}, category: {{ (it.category or '')|tojson }} },
    {% endfor %}
  ];
  const itemsById = new Map(wardrobeItems.map(i => [String(i.id), i]));

  if (!fileInput) return;

  let urls = [];
  let idx = 0;
  let fileKeys = [];
  let tagsByKey = {};

  function fileKey(file) {
    return `${file.name}|${file.size}|${file.lastModified}`;
  }

  function currentKey() {
    return fileKeys[idx] || null;
  }

  function cleanup() {
    urls.forEach(u => URL.revokeObjectURL(u));
    urls = [];
    fileKeys = [];
    tagsByKey = {};
  }

  function syncHidden() {
    if (!tagHidden) return;
    const list = fileKeys.map(k => tagsByKey[k] || []);
    tagHidden.value = JSON.stringify(list);
  }

  function renderTags() {
    if (!tagPanel || !tagChips) return;
    if (!urls.length) {
      tagPanel.style.display = "none";
      tagChips.innerHTML = "";
      return;
    }
    tagPanel.style.display = "block";
    const key = currentKey();
    const ids = key ? (tagsByKey[key] || []) : [];
    tagChips.innerHTML = "";
    ids.forEach((id) => {
      const item = itemsById.get(String(id));
      const label = item ? `${item.name} · ${item.category}` : `#${id}`;
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "chip";
      chip.textContent = label;
      const x = document.createElement("span");
      x.textContent = " ×";
      x.style.opacity = "0.7";
      chip.appendChild(x);
      chip.addEventListener("click", () => {
        removeTag(id);
      });
      tagChips.appendChild(chip);
    });
    syncHidden();
  }

  function addTag(id) {
    const key = currentKey();
    if (!key) return;
    if (!tagsByKey[key]) tagsByKey[key] = [];
    if (!tagsByKey[key].includes(id)) {
      tagsByKey[key].push(id);
    }
    renderTags();
  }

  function removeTag(id) {
    const key = currentKey();
    if (!key || !tagsByKey[key]) return;
    tagsByKey[key] = tagsByKey[key].filter(x => String(x) !== String(id));
    renderTags();
  }

  function renderResults() {
    if (!tagResults || !tagInput) return;
    const q = tagInput.value.trim().toLowerCase();
    if (!q) {
      tagResults.style.display = "none";
      tagResults.innerHTML = "";
      return;
    }
    const results = wardrobeItems.filter(it =>
      `${it.name} ${it.category}`.toLowerCase().includes(q)
    ).slice(0, 8);
    tagResults.innerHTML = "";
    if (!results.length) {
      const empty = document.createElement("div");
      empty.className = "text-muted small";
      empty.textContent = "검색 결과 없음";
      tagResults.appendChild(empty);
    } else {
      results.forEach(it => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "btn btn-soft btn-sm w-100 text-start mb-1";
        btn.textContent = `${it.name} · ${it.category}`;
        btn.addEventListener("click", () => {
          addTag(it.id);
          tagInput.value = "";
          renderResults();
        });
        tagResults.appendChild(btn);
      });
    }
    tagResults.style.display = "block";
  }

  function render() {
    if (!urls.length) {
      wrap.style.display = "none";
      renderTags();
      return;
    }
    wrap.style.display = "block";
    imgEl.src = urls[idx];
    counter.textContent = `${idx + 1} / ${urls.length}`;

    prevBtn.disabled = (idx === 0);
    nextBtn.disabled = (idx === urls.length - 1);

    thumbs.innerHTML = "";
    urls.forEach((u, i) => {
      const t = document.createElement("img");
      t.src = u;
      t.alt = `thumb-${i}`;
      t.style.width = "72px";
      t.style.height = "72px";
      t.style.objectFit = "cover";
      t.style.borderRadius = "12px";
      t.style.cursor = "pointer";
      t.style.border = (i === idx) ? "2px solid var(--text)" : "1px solid var(--border)";
      t.addEventListener("click", () => {
        idx = i;
        render();
      });
      thumbs.appendChild(t);
    });
    renderTags();
  }

  fileInput.addEventListener("change", () => {
    cleanup();
    const files = Array.from(fileInput.files || []);
    if (!files.length) return render();

    urls = files.map(f => URL.createObjectURL(f));
    fileKeys = files.map(fileKey);
    idx = 0;
    render();
  });

  prevBtn.addEventListener("click", () => {
    if (idx > 0) { idx--; render(); }
  });

  nextBtn.addEventListener("click", () => {
    if (idx < urls.length - 1) { idx++; render(); }
  });

  if (tagInput) {
    tagInput.addEventListener("input", renderResults);
    tagInput.addEventListener("focus", renderResults);
  }
  document.addEventListener("click", (e) => {
    if (!tagResults || !tagInput) return;
    if (e.target !== tagInput && !tagResults.contains(e.target)) {
      tagResults.style.display = "none";
    }
  });

  if (formEl) {
    formEl.addEventListener("submit", () => {
      syncHidden();
    });
  }

  // (선택) 키보드 좌/우
  window.addEventListener("keydown", (e) => {
    if (wrap.style.display === "none") return;
    if (e.key === "ArrowLeft") prevBtn.click();
    if (e.key === "ArrowRight") nextBtn.click();
  });
})();
</script>
{% endblock %}
