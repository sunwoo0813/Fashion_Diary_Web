<!doctype html>
<html lang="ko">
<head>
  {% set asset_v = "20260216v10" %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Fashion Diary{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css', v=asset_v) }}">
  <style>
    html, body { height: 100%; overflow: hidden; }
    main.container.my-4 {
      margin: 0 !important;
      padding: 0 !important;
      height: 100dvh;
      min-height: 100dvh;
      overflow-y: auto;
    }
    main.container.my-4 > *:first-child { margin-top: 0 !important; }
  </style>
  {% block styles %}{% endblock %}
</head>
<body>

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
