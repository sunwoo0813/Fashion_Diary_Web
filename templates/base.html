<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Fashion Diary{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  {% block styles %}{% endblock %}
</head>
<body>
  <div class="nav-wrap">
    <div class="container d-flex align-items-center justify-content-between py-2">
      <a class="brand text-decoration-none" href="/">Fashion Diary</a>
      <div class="nav-gap d-flex align-items-center">
        <a class="nav-btn text-decoration-none" href="{{ url_for('diary') }}">다이어리</a>
        <a class="nav-btn text-decoration-none" href="{{ url_for('wardrobe') }}">옷장</a>
      </div>
    </div>
  </div>

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
