<!doctype html>
<html lang="ko" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Fashion Diary{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* ====== Design Tokens ====== */
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: rgba(17,24,39,.08);
      --brand: #111827;
      --brand-contrast: #ffffff;
      --radius: 18px;
      --shadow: 0 10px 30px rgba(17,24,39,.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#0b0e13; --card:#0f141b; --text:#e5e7eb; --muted:#9ca3af;
        --border: rgba(255,255,255,.06); --brand:#e5e7eb; --brand-contrast:#0b0e13;
        --shadow: 0 10px 30px rgba(0,0,0,.45);
      }
    }
    /* Manual dark mode override via HTML attr */
    html[data-theme="light"] {
      --bg:#f7f8fa; --card:#ffffff; --text:#111827; --muted:#6b7280;
      --border: rgba(17,24,39,.08); --brand:#111827; --brand-contrast:#ffffff;
      --shadow: 0 10px 30px rgba(17,24,39,.08);
    }
    html[data-theme="dark"] {
      --bg:#0b0e13; --card:#0f141b; --text:#e5e7eb; --muted:#9ca3af;
      --border: rgba(255,255,255,.06); --brand:#e5e7eb; --brand-contrast:#0b0e13;
      --shadow: 0 10px 30px rgba(0,0,0,.45);
    }

    /* ====== Base ====== */
    html,body {height:100%}
    body {
      background: radial-gradient(1200px 600px at 20% -10%, rgba(99,102,241,.08), transparent 70%),
                  radial-gradient(900px 500px at 120% 10%, rgba(16,185,129,.08), transparent 70%),
                  var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      letter-spacing: .1px;
    }
    .container {max-width: 1080px;}
    a {color: inherit}

    /* ====== Navbar ====== */
    .nav-wrap {
      position: sticky; top:0; z-index: 20;
      backdrop-filter: saturate(160%) blur(14px);
      background: color-mix(in oklab, var(--bg) 85%, transparent);
      border-bottom: 1px solid var(--border);
    }
    .brand {font-weight: 800; letter-spacing:.3px}
    .nav-btn {border-radius: 12px; padding:.55rem .9rem; border:1px solid var(--border)}
    .nav-btn-primary {background: var(--brand); color: var(--brand-contrast); border:none}
    .nav-gap > * + * {margin-left:.5rem}

    /* ====== Cards ====== */
    .card-clean {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: clip;
    }
    .card-media {
      width: 100%;
      aspect-ratio: 4/5; /* 안정된 썸네일 비율 */
      object-fit: cover;
      display:block;
    }
    .card-body {padding: 14px 16px}
    .meta {color: var(--muted); font-size: .9rem}
    .chip {
      display:inline-flex; align-items:center; gap:.35rem;
      padding:.28rem .6rem; border-radius: 999px;
      background: color-mix(in oklab, var(--card) 70%, var(--bg));
      border:1px solid var(--border); font-size:.85rem;
      transition: transform .15s ease;
    }
    .chip:hover {transform: translateY(-1px)}
    .section-head {display:flex; justify-content:space-between; align-items:end; margin: 12px 2px 14px}
    .ghost {color: var(--muted)}

    /* ====== Forms ====== */
    .field {margin-bottom: .9rem}
    .btn-solid {background: var(--brand); color: var(--brand-contrast); border:none; border-radius:12px}
    .btn-soft {background: transparent; border:1px solid var(--border); border-radius:12px}
  </style>
</head>
<body>
  <div class="nav-wrap">
    <div class="container d-flex align-items-center justify-content-between py-2">
      <a class="brand text-decoration-none" href="/">👗 Fashion Diary</a>
      <div class="nav-gap d-flex align-items-center">
        <a class="nav-btn text-decoration-none" href="{{ url_for('diary') }}">다이어리</a>
        <a class="nav-btn text-decoration-none" href="{{ url_for('wardrobe') }}">옷장</a>
        <button id="themeBtn" class="nav-btn" title="테마 전환">🌗</button>
      </div>
    </div>
  </div>

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Theme toggle (light / dark / system)
    (function(){
      const key='fd-theme';
      const html=document.documentElement;
      const btn=document.getElementById('themeBtn');
      function apply(v){ html.setAttribute('data-theme', v); }
      function cycle(){
        const cur=localStorage.getItem(key) || 'system';
        const nxt= cur==='system' ? 'dark' : cur==='dark' ? 'light' : 'system';
        localStorage.setItem(key, nxt); apply(nxt);
        btn.textContent = (nxt==='dark'?'🌙':nxt==='light'?'☀️':'🌗');
      }
      const init=localStorage.getItem(key) || 'system'; apply(init);
      if(btn){ btn.textContent = (init==='dark'?'🌙':init==='light'?'☀️':'🌗'); btn.onclick=cycle; }
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
