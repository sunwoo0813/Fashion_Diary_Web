<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Fashion Diary{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  {% block styles %}{% endblock %}
</head>
<body>
  {% if not hide_nav %}
  <div class="nav-wrap">
    <div class="container d-flex align-items-center justify-content-between py-2">
      <a class="brand text-decoration-none" href="{{ url_for('diary') }}">Fashion Diary</a>
      <div class="nav-gap d-flex align-items-center">
        <a class="nav-btn text-decoration-none" href="{{ url_for('diary') }}">다이어리</a>
        <a class="nav-btn text-decoration-none" href="{{ url_for('wardrobe') }}">옷장</a>
        {% if session.get('user_email') %}
          <a class="nav-btn text-decoration-none" href="{{ url_for('account') }}">설정</a>
          <span class="nav-user">{{ session.get('user_email') }}</span>
          <form method="post" action="{{ url_for('logout') }}" class="d-inline">
            <button class="nav-btn nav-btn-primary" type="submit">로그아웃</button>
          </form>
        {% else %}
          <a class="nav-btn nav-btn-primary text-decoration-none" href="{{ url_for('home') }}">로그인</a>
        {% endif %}
      </div>
    </div>
  </div>
  {% endif %}

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
