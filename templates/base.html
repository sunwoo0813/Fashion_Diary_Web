<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Fashion Diary{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  {% block styles %}{% endblock %}
</head>
<body>
  {% if not hide_nav %}
  <div class="nav-wrap">
    <div class="container nav-stack">
      <a class="profile-btn profile-floating" href="{{ url_for('account') }}" aria-label="Profile">
        <svg class="profile-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c1.8-3.4 5.1-5.5 8-5.5s6.2 2.1 8 5.5"></path>
        </svg>
      </a>
      <div class="nav-center">Fashion Diary</div>
      <div class="nav-links-bar">
        {% set ep = request.endpoint %}
        <a class="nav-link text-decoration-none {% if ep in ['diary','diary_day','diary_month'] %}is-active{% endif %}" href="{{ url_for('diary') }}">다이어리</a>
        <a class="nav-link text-decoration-none {% if ep == 'wardrobe' %}is-active{% endif %}" href="{{ url_for('wardrobe') }}">옷장</a>
        <a class="nav-link text-decoration-none {% if ep == 'stats' %}is-active{% endif %}" href="{{ url_for('stats') }}">통계</a>
      </div>
    </div>
  </div>
  {% endif %}

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
