{% extends "base.html" %}
{% block title %}아이템 추가 - Fashion Diary{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="glass p-4">
      <h3 class="mb-3">아이템 추가</h3>
      <form method="post" enctype="multipart/form-data">
        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">브랜드</label>
            <input name="brand" class="form-control" placeholder="예: COS" required>
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">제품명</label>
            <input name="product" class="form-control" placeholder="예: 리넨 셔츠" required>
          </div>
        </div>
        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">카테고리</label>
            <select name="category" class="form-select">
              <option value="">선택</option>
              <option>top</option>
              <option>bottom</option>
              <option>outer</option>
              <option>shoes</option>
              <option>acc</option>
            </select>
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">색상</label>
            <input name="color" class="form-control" placeholder="예: 아이보리">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">사진</label>
          <input type="file" name="image" class="form-control" accept="image/*">
          <div id="itemPhotoPreviewWrap" class="mt-3" style="display:none;">
            <div class="card-clean p-2">
              <img
                id="itemPhotoPreviewImg"
                alt="preview"
                style="width:100%; height:320px; object-fit:contain; border-radius:14px; display:block; background:rgba(47,62,78,0.04);"
              />
            </div>
          </div>
        </div>
        <div class="d-grid">
          <button class="btn btn-dark" type="submit">저장</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/item_new.js') }}"></script>
{% endblock %}
